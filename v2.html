<!DOCTYPE html> <!-- Defines HTML5 document -->
<html lang="en"> <!-- Root element with language -->

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta charset="UTF-8"> <!-- Character encoding -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsive -->
    <title>Item Lister</title> <!-- Page title -->

    <!-- Linking CSS file -->
    <link rel="stylesheet" href="v2.css">
</head>

<body>

    <!-- HEADER SECTION -->
    <header id="main-header"> <!-- Top green header -->
        <div class="container"> <!-- Center content -->
            <h1 id="header-title">Item Lister <span style="display:none">123</span></h1> <!-- Title -->
        </div>
    </header>

    <!-- MAIN CONTAINER -->
    <div class="container">

        <!-- CARD BOX -->
        <div id="main-card">

            <!-- ADD ITEMS TITLE -->
            <h2 class="title">Add Items</h2>
            <form class="form-inline mb-3">
                <input type="text"class="form-control mr-2">
                <select class="form-control mr-2">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                </select>
            </form>

            <!-- FORM -->
            <form id="addForm">
                <!-- Input field -->
                <input type="text" id="item-input" placeholder="Enter item">

                <!-- Submit button -->
                <input type="submit" value="Submit" id="submit-btn">
            </form>

            <!-- ITEMS TITLE -->
            <h2 class="title">Items</h2>

            <!-- ITEM LIST -->
            <ul id="items">
                <li class="list-item">Item 1</li>
                <li class="list-item">Item 2</li>
                <li class="list-item">Item 3</li>
                <li class="list-item">Item 4</li>
            </ul>
            <div id="output"></div>
            <br>
            <button class="btn btn-dark btn-block"id="button">Click Here</button>
            <br>
            <div id="box"style="width:400px;height:200px;background:#f4f4f4">HELLO</div>


        </div>
    </div>

<script src="v2dom1.js"></script>
</body>
</html>
